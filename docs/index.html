<body>

  <main>
    <img src="assets/icon-256.png" alt="" width="128" height="128" class="icon" />
    <h1>halfFull</h1>

    <p class="tagline lang-en" lang="en"><span class="kbd-line"><kbd>⌥</kbd><kbd>F</kbd></span>　<span class="hw">Press once.</span>　<span class="fw">Ｗｉｄｔｈ-ｃｏｒｒｅｃｔ．</span></p>
    <p class="tagline lang-zh" lang="zh">按一下 <kbd>⌥</kbd><kbd>F</kbd>，半角立刻全角。</p>
    <p class="tagline lang-ja"><kbd>⌥</kbd><kbd>F</kbd> で、半角を全角に。</p>

    <!-- Plain-language scenario line: tells first-time visitors (and crawlers)
         exactly who this is for, using the words people actually search. -->
    <p class="context">全角カタカナ・全角ローマ字を求める日本のフォーム向け。<span lang="en">For Japanese forms that demand full-width katakana or romaji input.</span></p>

    <!-- Mock form fields — left rejects half-width, right accepts full-width.
         This is the actual product moment: filling a Japanese site that demands
         "全角で入力してください" and not wanting to retype the whole field by hand.
         Two example pairs so non-CJK readers see the effect on Latin text too. -->
    <section class="forms" aria-label="Demo: Japanese form fields before and after halfFull">
      <!-- Pair 1: Katakana name — the classic case. -->
      <div class="form bad">
        <div class="row">
          <label>氏名（カナ）<span class="req">必須</span></label>
          <div class="field" data-state="error">
            <input type="text" value="ﾔﾏﾀﾞ ﾀﾛｳ" readonly aria-invalid="true">
          </div>
          <p class="msg error">⚠ 全角カタカナで入力してください</p>
        </div>
      </div>
      <div class="form good">
        <div class="row">
          <label>氏名（カナ）<span class="req">必須</span></label>
          <div class="field" data-state="ok">
            <input type="text" value="ヤマダ　タロウ" readonly>
          </div>
          <p class="msg ok">✓ OK</p>
        </div>
      </div>

      <!-- Pair 2: Romaji name in Latin — for English-script readers the
           wide-vs-narrow contrast is unmistakable. Real, common scenario:
           visa applications, embassy forms, international wire transfer
           recipient fields, some passport-renewal portals — anywhere
           Japanese institutional systems still demand 全角英字 for the
           Latin spelling of a name. -->
      <div class="form bad">
        <div class="row">
          <label>氏名（ローマ字）<span class="req">必須</span></label>
          <div class="field" data-state="error">
            <input type="text" value="TARO YAMADA" readonly aria-invalid="true">
          </div>
          <p class="msg error">⚠ 全角ローマ字で入力してください</p>
        </div>
      </div>
      <div class="form good">
        <div class="row">
          <label>氏名（ローマ字）<span class="req">必須</span></label>
          <div class="field" data-state="ok">
            <input type="text" value="ＴＡＲＯ　ＹＡＭＡＤＡ" readonly>
          </div>
          <p class="msg ok">✓ OK</p>
        </div>
      </div>
    </section>
